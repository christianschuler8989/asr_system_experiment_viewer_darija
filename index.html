<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASR Review Tool — Darija Pilot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <header id="toolbar">
      <div id="toolbar-nav">
        <label for="location-select" class="sr-only">Location</label>
        <select id="location-select" aria-label="Location"></select>

        <label for="file-select" class="sr-only">File</label>
        <select id="file-select" aria-label="File"></select>
      </div>

      <div id="toolbar-font-size">
        <button id="font-shrink-btn" class="font-size-btn" title="Shrink transcription text">A&#8722;</button>
        <span id="font-size-display"></span>
        <button id="font-enlarge-btn" class="font-size-btn" title="Enlarge transcription text">A+</button>
      </div>

      <div id="toolbar-player">
        <button id="play-btn" disabled aria-label="Play / Pause">&#9654; Play</button>
      </div>

      <div id="toolbar-meta">
        <span id="reviewer-label" title="Reviewer name"></span>
      </div>
    </header>

    <div id="waveform-container">
      <!-- WaveSurfer renders its canvas directly into this div -->
      <div id="waveform-placeholder">Decoding audio&hellip;</div>
    </div>

    <div id="sequence-annotation-area">
      <label for="sequence-text">Sequence annotation</label>
      <textarea id="sequence-text" dir="rtl"
        placeholder="Full transcription or notes for this audio clip…"></textarea>
    </div>

    <main id="transcription-area">
      <table id="transcription-table" aria-label="ASR system transcriptions">
        <tbody id="transcription-body">
          <tr id="loading-row">
            <td colspan="2" class="status-cell">Loading data&hellip;</td>
          </tr>
        </tbody>
      </table>
    </main>

    <footer id="annotation-panel">
      <div id="notes-block">
        <label for="file-notes">File notes</label>
        <textarea id="file-notes" placeholder="Notes about this recording…" rows="3"></textarea>
      </div>
      <div id="panel-actions">
        <label for="import-input" class="btn btn-secondary">
          Import annotations
          <input type="file" id="import-input" accept=".json" hidden>
        </label>
        <button id="export-btn" class="btn btn-primary">Export annotations</button>
      </div>
    </footer>

  </div><!-- /#app -->

  <!-- Span annotation dialog — shown on text selection (M4) -->
  <div id="tag-dialog" hidden role="dialog" aria-label="Span annotation">

    <!-- Row 1: binary pairs -->
    <div class="tag-row">
      <div class="tag-pair-group">
        <button class="tag-btn" data-group="correctness" data-value="correct">correct</button>
        <button class="tag-btn" data-group="correctness" data-value="incorrect">incorrect</button>
      </div>
      <div class="tag-pair-group">
        <button class="tag-btn" data-group="register" data-value="standard">standard</button>
        <button class="tag-btn" data-group="register" data-value="dialectal">dialectal</button>
      </div>
    </div>

    <!-- Row 2: loanword multi-select -->
    <div class="tag-row">
      <div class="tag-multi-group">
        <span class="tag-group-label">loanword:</span>
        <button class="tag-btn" data-group="loanword" data-value="French">French</button>
        <button class="tag-btn" data-group="loanword" data-value="Spanish">Spanish</button>
        <button class="tag-btn" data-group="loanword" data-value="English">English</button>
        <button class="tag-btn" data-group="loanword" data-value="Other">other</button>
      </div>
    </div>

    <!-- Row 3: flags + actions -->
    <div class="tag-row tag-row-footer">
      <div class="tag-flags">
        <button class="tag-btn" data-group="flag" data-value="unclear">unclear</button>
        <button class="tag-btn" data-group="flag" data-value="other">other</button>
      </div>
      <div class="tag-dialog-actions">
        <button id="tag-remove-btn" hidden>Remove</button>
        <button id="tag-done-btn">Done</button>
      </div>
    </div>

  </div>

  <!-- wavesurfer.js v7: audio waveform renderer -->
  <script src="https://cdn.jsdelivr.net/npm/wavesurfer.js@7/dist/wavesurfer.min.js"></script>
  <!-- js-yaml: YAML parser for configs/model_config.yaml -->
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
